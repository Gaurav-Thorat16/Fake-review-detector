kind = "web"
previewPath = "/"
title = "Fake Review Detector"
version = "1.0.0"
id = "artifacts/fake-review-detector"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18970
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/fake-review-detector run dev"

[services.env]
PORT = "18970"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/fake-review-detector", "run", "build"]
publicDir = "artifacts/fake-review-detector/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
